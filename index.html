<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoodVibe Daily — Daily Quotes for a Better You</title>
  <meta name="description" content="Start your day with an inspiring quote. Fresh motivation, healing thoughts, and positive vibes — daily." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="logo">GoodVibe <span>Daily</span></div>
    <nav class="category-nav">
      <button class="nav-btn active" data-category="All">All</button>
      <button class="nav-btn" data-category="Motivation">Motivation</button>
      <button class="nav-btn" data-category="Healing">Healing</button>
      <button class="nav-btn" data-category="Hustle">Hustle</button>
      <button class="nav-btn" data-category="Calm">Calm</button>
    </nav>
  </header>

  <main>
    <!-- Hero Quote Card -->
    <div class="quote-card" id="quote-card">
      <div class="quote-bg" id="quote-bg"></div>
      <div class="quote-overlay"></div>
      <div class="quote-content">
        <div class="quote-tag" id="quote-tag"></div>
        <div class="quote-text" id="quote-text"></div>
        <div class="quote-author" id="quote-author"></div>
        <div class="quote-actions">
          <button id="btn-new">New Quote</button>
          <button id="btn-copy">Copy</button>
          <button id="btn-download">Download</button>
        </div>
      </div>
      <!-- Unsplash Attribution -->
      <div class="photo-credit" id="photo-credit"></div>
    </div>

    <!-- Ad Slot -->
    <div class="ad-slot">
      <span class="ad-placeholder">Advertisement</span>
    </div>

    <!-- Quote Grid -->
    <section class="grid-section">
      <h2 id="grid-title">All Quotes</h2>
      <div class="quote-grid" id="quote-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 GoodVibe Daily &mdash; <a href="/about">About</a> &middot; <a href="/privacy">Privacy</a></p>
  </footer>

  <canvas id="export-canvas" style="display:none"></canvas>
  <script src="app.js"></script>
</body>
</html>
