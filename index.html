<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoodVibe Quotes — Motivation, Healing, Hustle & Calm</title>
<meta name="description" content="Inspiring quotes for Motivation, Healing, Hustle, and Calm. Free daily quote images with beautiful backgrounds.">

<link rel="stylesheet" href="style.css">

<body>

<header class="site-header">
  <div class="logo">GoodVibe</div>
  <nav class="category-nav">
    <button class="nav-btn active" data-category="All">All</button>
    <button class="nav-btn" data-category="Motivation">Motivation</button>
    <button class="nav-btn" data-category="Healing">Healing</button>

        <button id="btn-new" title="New quote">New Quote</button>
        <button id="btn-copy" title="Copy quote">Copy</button>
        <button id="btn-download" title="Download as image">Save Image</button>
      </div>
    </div>

  <div class="ad-slot ad-slot-mid" id="ad-mid">
    <!-- AdSense unit goes here after approval -->
    <span class="ad-placeholder">Ad space</span>
  </div>

  <section class="grid-section">
    <h2 id="grid-title">All Quotes</h2>

  <div class="ad-slot ad-slot-bottom" id="ad-bottom">
    <span class="ad-placeholder">Ad space</span>

<footer class="site-footer">

  <p><a href="about.html">About</a> &middot; <a href="privacy.html">Privacy Policy</a> &middot; <a href="contact.html">Contact</a></p>
